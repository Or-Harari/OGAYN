# Minimal path-based reverse proxy for multiple Freqtrade bots on one domain
# - Each bot is exposed under a distinct path prefix (e.g., /bot/test10/)
# - Cookies are rewritten to be path-scoped, isolating sessions per bot
# - WebSocket upgrade headers are set to keep live updates working

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Helpful for SPAs and content rewriting
    proxy_buffering off;
    proxy_read_timeout 600s;

    # WebSocket upgrade handling
    map $http_upgrade $connection_upgrade {
        default     close;
        websocket   upgrade;
    }

    server {
        listen 80;
        server_name localhost;

        # Bot ft-bot-11 under /bot/ft-bot-11/
        location /bot/ft-bot-11/ {
            proxy_pass http://host.docker.internal:18081/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /bot/ft-bot-11;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_cookie_path / /bot/ft-bot-11;
        }

        location /bot/ft-bot-11/ws {
            proxy_pass http://host.docker.internal:18081/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Bot ft-bot-10 under /bot/ft-bot-10/
        location /bot/ft-bot-10/ {
            proxy_pass http://host.docker.internal:18080/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /bot/ft-bot-10;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_cookie_path / /bot/ft-bot-10;
        }

        location /bot/ft-bot-10/ws {
            proxy_pass http://host.docker.internal:18080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # Health check / splash
        location = / {
            return 200 'OK - Nginx proxy is running. Try /bot/ft-bot-11/ or /bot/ft-bot-10/';
        }
    }

    # Subdomain-based isolation: one origin per bot (isolates localStorage and cookies)
    server {
        listen 80;
        server_name ft-bot-11.localhost;

        location / {
            proxy_pass http://host.docker.internal:18081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /ws {
            proxy_pass http://host.docker.internal:18081/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    server {
        listen 80;
        server_name ft-bot-10.localhost;

        location / {
            proxy_pass http://host.docker.internal:18080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /ws {
            proxy_pass http://host.docker.internal:18080/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
